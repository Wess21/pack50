version: '3.8'

# Production docker-compose using pre-built image from GitHub Container Registry
# This file is used on VDS servers for deployment

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pack50_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pack50
      POSTGRES_USER: pack50
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - pack50_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U pack50" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: pack50_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - pack50_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128M

  bot:
    image: ghcr.io/wess21/pack50:latest
    container_name: pack50_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-}
      DATABASE_URL: postgresql://pack50:${DB_PASSWORD}@postgres:5432/pack50
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      JWT_SECRET: ${JWT_SECRET}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD}
    ports:
      - "3000:3000"
    networks:
      - pack50_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

volumes:
  postgres_data:
  redis_data:


networks:
  pack50_network:
    driver: bridge
