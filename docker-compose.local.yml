version: '3.8'

# Local test with locally built image
# Usage: docker compose -f docker-compose.local.yml up

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pack50_local_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pack50_local
      POSTGRES_USER: pack50_local
      POSTGRES_PASSWORD: local_password_123
    ports:
      - "35432:5432"
    networks:
      - pack50_local_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pack50_local"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: pack50_local_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "36379:6379"
    networks:
      - pack50_local_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  bot:
    image: pack50-local:latest
    container_name: pack50_local_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-test_token_placeholder}
      DATABASE_URL: postgresql://pack50_local:local_password_123@postgres:5432/pack50_local
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
      PORT: 3000
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-local_jwt_secret_min_32_chars_long}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-local_admin_123}
    ports:
      - "33000:3000"
    networks:
      - pack50_local_network

networks:
  pack50_local_network:
    driver: bridge
