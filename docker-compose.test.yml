version: '3.8'

# Test docker-compose for local isolated testing
# This simulates production environment locally before deployment
# Usage: docker compose -f docker-compose.test.yml up --build

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pack50_test_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pack50_test
      POSTGRES_USER: pack50_test
      POSTGRES_PASSWORD: test_password_123
    ports:
      - "25432:5432"  # Different port to avoid conflicts
    volumes:
      - test_postgres_data:/var/lib/postgresql/data
    networks:
      - pack50_test_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pack50_test"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    container_name: pack50_test_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "26379:6379"  # Different port to avoid conflicts
    volumes:
      - test_redis_data:/data
    networks:
      - pack50_test_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    deploy:
      resources:
        limits:
          memory: 128M

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: pack50_test_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      BOT_TOKEN: ${BOT_TOKEN:-test_token_placeholder}
      DATABASE_URL: postgresql://pack50_test:test_password_123@postgres:5432/pack50_test
      REDIS_URL: redis://redis:6379
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      NODE_ENV: production
      PORT: 3000
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      JWT_SECRET: ${JWT_SECRET:-test_jwt_secret_min_32_chars_long}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-test_admin_123}
    ports:
      - "23000:3000"  # Different port to avoid conflicts
    networks:
      - pack50_test_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  test_postgres_data:
  test_redis_data:

networks:
  pack50_test_network:
    driver: bridge
