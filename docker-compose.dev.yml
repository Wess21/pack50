services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: pack50-postgres
    environment:
      POSTGRES_DB: pack50
      POSTGRES_USER: pack50
      POSTGRES_PASSWORD: dev_password
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pack50"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pack50-redis
    command: redis-server --requirepass dev_password
    ports:
      - "16379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "dev_password", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
